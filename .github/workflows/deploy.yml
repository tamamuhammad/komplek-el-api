name: Deploy Laravel to CloudPanel

# Robot ini hanya menyala jika ada push/merge ke cabang main
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Menghubungkan ke VPS dan Menjalankan Script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          # Perintah yang diketik otomatis oleh robot di dalam VPS-mu
          script: |
            cd ~/htdocs/api.komplek-el.com

            # 1. Tarik kode terbaru dari GitHub
            git pull origin main

            # 2. Instal dependensi PHP baru (jika ada)
            composer install --no-interaction --prefer-dist --optimize-autoloader

            # 3. Sinkronisasi database
            php artisan migrate --force

            # 4. Bersihkan cache Laravel agar data baru langsung terbaca
            php artisan optimize:clear
